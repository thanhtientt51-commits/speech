    html+='<div class="card-hover flex items-center justify-between px-5 py-4 border-b border-gray-50 last:border-0 cursor-pointer" onclick="openDetail('+item.id+')"><div class="flex items-center gap-3 flex-1 min-w-0"><div class="w-9 h-9 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1677ff" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="text-sm font-semibold truncate">'+item.title+'</span></div><span class="text-xs bg-gray-100 text-gray-500 px-2.5 py-1 rounded-full whitespace-nowrap ml-3 font-medium">'+item.cat+'</span></div>';
  });
  document.getElementById('newsList').innerHTML=html||'<div class="text-center py-20 text-gray-400"><div class="text-4xl mb-4">📭</div><p class="text-sm">暂无匹配讲话</p></div>';
}

// ====== DETAIL ======
function openDetail(id){
  curDetail=newsData.find(function(x){return x.id===id});if(!curDetail)return;
  document.getElementById('listPage').classList.add('hidden');
  document.getElementById('detailPage').classList.remove('hidden');
  document.getElementById('detailTitle').textContent=curDetail.title;
  document.getElementById('detailSource').textContent=curDetail.source+' · '+curDetail.time;
  document.getElementById('detailStar').textContent=curDetail.star?'★':'☆';
  document.getElementById('detailCat').textContent=curDetail.cat;
  document.getElementById('detailSummary').textContent=curDetail.summary;
  document.getElementById('detailSourceLink').textContent=curDetail.sourceLink;
  // Exam table
  var rows='';
  curDetail.exam.forEach(function(e){rows+='<tr class="border-b border-gray-50 hover:bg-blue-50/30 transition"><td class="px-6 py-5 font-semibold text-gray-800 text-base">'+e.point+'</td><td class="px-6 py-5 text-gray-600 text-base">'+e.test+'</td><td class="px-6 py-5 text-orange-600 text-base leading-relaxed">'+e.trap+'</td><td class="px-6 py-5 text-primary font-bold text-base">'+e.mem+'</td></tr>'});
  document.getElementById('tabExamBody').innerHTML=rows;
  // Shenlun
  document.getElementById('tabShenlunContent').textContent=curDetail.shenlun;
  // Words
  var chips='';
  curDetail.words.forEach(function(w){chips+='<span class="px-4 py-2.5 bg-white rounded-xl text-sm font-semibold shadow-sm border border-purple-100"><span class="text-primary">'+w.w+'</span><span class="text-gray-400 mx-2">|</span><span class="text-gray-600">'+w.d+'</span></span>'});
  document.getElementById('tabWordsContent').innerHTML=chips;
  // Reset tabs
  switchDetailTab('exam',document.querySelector('#detailTabs button[data-dtab="exam"]'));
  window.scrollTo(0,0);
}

function backToList(){
  document.getElementById('listPage').classList.remove('hidden');
  document.getElementById('detailPage').classList.add('hidden');
  window.scrollTo(0,0);
}

function toggleStar(){
  if(!curDetail)return;
  curDetail.star=!curDetail.star;
  var idx=favorites.indexOf(curDetail.id);
  if(curDetail.star){if(idx===-1)favorites.push(curDetail.id)}else{if(idx!==-1)favorites.splice(idx,1)}
  localStorage.setItem('sz_favs',JSON.stringify(favorites));
  document.getElementById('detailStar').textContent=curDetail.star?'★':'☆';
  if(curCat==='fav')renderList();
}

var tabColors={exam:'#1677ff',shenlun:'#16a34a',words:'#8b5cf6'};
function switchDetailTab(tab,el){
  document.querySelectorAll('#detailTabs button').forEach(function(b){b.classList.remove('tab-active','shadow-md');b.classList.add('bg-white','border-2','border-gray-200','text-gray-500');b.style.background='';b.style.color=''});
  el.classList.add('tab-active','shadow-md');el.classList.remove('bg-white','border-2','border-gray-200','text-gray-500');
  el.style.background=tabColors[tab];el.style.color='#fff';
  document.getElementById('tabExam').classList.add('hidden');document.getElementById('tabShenlun').classList.add('hidden');document.getElementById('tabWords').classList.add('hidden');
  if(tab==='exam')document.getElementById('tabExam').classList.remove('hidden');
  else if(tab==='shenlun')document.getElementById('tabShenlun').classList.remove('hidden');
  else document.getElementById('tabWords').classList.remove('hidden');
}

// ====== INIT ======
renderList();
</script></body></html>
